<!doctype html>
<html lang="sl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#FFFFFF" />

    <!-- iOS -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="ATHLOS" />
    <link rel="apple-touch-icon" href="/icon-192.png" />

    <!-- Android -->
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- SEO / sharing -->
    <meta name="description" content="ATHLOS — Athlete Operating System" />
    <meta name="application-name" content="ATHLOS" />

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Fill html+body (incl. iOS safe areas) with the theme bg so no white band
         shows through the fixed app shell; matches the OS theme before React mounts. -->
    <style>
      html, body { background: #FFFFFF; }
      @media (prefers-color-scheme: dark) { html, body { background: #0A0A09; } }
    </style>

    <!-- Design-system fonts: Poppins = all UI text (headings, body, labels),
         JetBrains Mono = data/metrics -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400;1,500;1,600&family=Cinzel:wght@700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet" />

    <!-- splash engraving — preloaded so the launch animation never flashes empty -->
    <link rel="preload" as="image" href="/img/greek-god.png" />

    <title>ATHLOS</title>
  </head>
  <body style="margin:0;padding:0;overscroll-behavior:none;">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
